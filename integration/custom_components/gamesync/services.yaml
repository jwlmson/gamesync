trigger_effect:
  name: Trigger Effect
  description: Manually trigger a GameSync light/sound effect for a team event.
  fields:
    team_id:
      name: Team ID
      description: "Team identifier (e.g. 'nfl:15'). Required."
      required: true
      selector:
        text:
    event_type:
      name: Event Type
      description: Type of event to simulate.
      required: true
      default: score_change
      selector:
        select:
          options:
            - score_change
            - touchdown
            - field_goal
            - goal
            - three_pointer
            - home_run
            - game_start
            - game_end
            - halftime

set_delay:
  name: Set Anti-Spoiler Delay
  description: Set the stream delay for a team (0–120 seconds).
  fields:
    team_id:
      name: Team ID
      description: The team identifier to update.
      required: true
      selector:
        text:
    delay_seconds:
      name: Delay (seconds)
      description: Number of seconds to delay effects after a score event.
      required: true
      selector:
        number:
          min: 0
          max: 120
          unit_of_measurement: s

emergency_stop:
  name: Emergency Stop
  description: Immediately cancel ALL active light/sound effects.

mute_toggle:
  name: Toggle Mute
  description: Toggle the global mute state — muted effects are suppressed entirely.

set_primary_session:
  name: Set Primary Session
  description: Manually switch which active game session is "primary" (effects fire).
  fields:
    session_id:
      name: Session ID
      description: The numeric session ID to promote to primary.
      required: true
      selector:
        number:
          min: 1
          mode: box

refresh:
  name: Refresh
  description: Force an immediate refresh of game data from the add-on.
